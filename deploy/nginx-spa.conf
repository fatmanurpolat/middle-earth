# Static SPA server for the Vite builds (landing / dashboard).
# Behind Caddy, which terminates TLS and proxies to this on port 80.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache fingerprinted assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: every unknown route returns index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
